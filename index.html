<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Draw — Hand Tracking</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <h1 class="logo">✋ Air Draw</h1>
      <span class="version">v2.0</span>
    </div>
    <div class="header-right">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Starting camera...</span>
    </div>
  </header>

  <main class="main">

    <div class="canvas-wrapper">
      <!-- Video is CSS-mirrored so it looks natural, but drawing coords are corrected -->
      <video id="video" autoplay playsinline></video>
      <canvas id="drawCanvas"></canvas>
      <canvas id="overlayCanvas"></canvas>

      <div class="gesture-hints" id="gestureHints">
        <div class="hint-item">☝️ <span>1 finger = Draw</span></div>
        <div class="hint-item">✌️ <span>2 fingers = Eraser</span></div>
        <div class="hint-item">🤌 <span>Pinch = Scale</span></div>
        <div class="hint-item">🖐️ <span>Palm = Move</span></div>
        <div class="hint-item">✊ <span>Fist = Pause</span></div>
        <div class="hint-item">⌨️ <span>Hold CTRL = Draw</span></div>
      </div>
    </div>

    <aside class="controls">

      <section class="control-section">
        <h3 class="section-title">Colors</h3>
        <div class="color-grid" id="colorGrid">
          <button class="color-btn active" data-color="#ff3b3b" style="--c:#ff3b3b" title="Red"><span class="color-swatch"></span><span class="color-label">Red</span></button>
          <button class="color-btn" data-color="#00e676" style="--c:#00e676" title="Green"><span class="color-swatch"></span><span class="color-label">Green</span></button>
          <button class="color-btn" data-color="#2979ff" style="--c:#2979ff" title="Blue"><span class="color-swatch"></span><span class="color-label">Blue</span></button>
          <button class="color-btn" data-color="#ffea00" style="--c:#ffea00" title="Yellow"><span class="color-swatch"></span><span class="color-label">Yellow</span></button>
          <button class="color-btn" data-color="#ff6d00" style="--c:#ff6d00" title="Orange"><span class="color-swatch"></span><span class="color-label">Orange</span></button>
          <button class="color-btn" data-color="#e040fb" style="--c:#e040fb" title="Purple"><span class="color-swatch"></span><span class="color-label">Purple</span></button>
          <button class="color-btn" data-color="#ffffff" style="--c:#ffffff" title="White"><span class="color-swatch"></span><span class="color-label">White</span></button>
          <button class="color-btn" data-color="#00e5ff" style="--c:#00e5ff" title="Cyan"><span class="color-swatch"></span><span class="color-label">Cyan</span></button>
        </div>
      </section>

      <section class="control-section">
        <h3 class="section-title">Brush Size</h3>
        <div class="slider-row">
          <input type="range" id="brushSize" min="2" max="30" value="5" class="slider" />
          <span class="slider-value" id="brushValue">5px</span>
        </div>
        <div class="brush-preview-wrap">
          <canvas id="brushPreview" width="80" height="80"></canvas>
        </div>
      </section>

      <section class="control-section">
        <h3 class="section-title">Tools</h3>
        <div class="tool-grid">
          <button class="tool-btn active" id="btnDraw"><span class="tool-icon">✏️</span> Draw</button>
          <button class="tool-btn" id="btnEraser"><span class="tool-icon">⬜</span> Eraser</button>
        </div>
      </section>

      <section class="control-section">
        <h3 class="section-title">Actions</h3>
        <button class="action-btn danger" id="btnClear">🗑️ Clear Canvas</button>
        <button class="action-btn" id="btnSave">💾 Save Drawing</button>
        <button class="action-btn" id="btnToggleHints">💡 Toggle Hints</button>
      </section>

      <section class="control-section">
        <h3 class="section-title">Keyboard</h3>
        <div class="kbd-list">
          <div class="kbd-row"><kbd>Hold CTRL</kbd><span>Draw</span></div>
          <div class="kbd-row"><kbd>C</kbd><span>Clear</span></div>
          <div class="kbd-row"><kbd>E</kbd><span>Eraser</span></div>
          <div class="kbd-row"><kbd>S</kbd><span>Save</span></div>
          <div class="kbd-row"><kbd>H</kbd><span>Hints</span></div>
          <div class="kbd-row"><kbd>+</kbd><kbd>-</kbd><span>Brush size</span></div>
        </div>
      </section>

      <section class="control-section stats-section">
        <div class="stat"><span class="stat-label">FPS</span><span class="stat-val" id="fpsVal">--</span></div>
        <div class="stat"><span class="stat-label">Mode</span><span class="stat-val" id="modeVal">Draw</span></div>
        <div class="stat"><span class="stat-label">Hand</span><span class="stat-val" id="handVal">None</span></div>
      </section>

    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
